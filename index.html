<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>
<style>
:root{
  --primary:#c084fc;
  --secondary:#6b21a8;
}
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#050505;
  color:white;
}
.start,
.browser{
  position:absolute;
  inset:0;
}
.start{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.browser{
  display:none;
  background:#0d0d0d;
  padding:20px;
  box-sizing:border-box;
}
#bgFrame{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
  z-index:0;
  pointer-events:none;
}
.content{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.logo{
  font-size:72px;
  font-weight:900;
  margin-bottom:40px;
  background:linear-gradient(135deg,#fff,#c084fc,#6b21a8);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:gradientMove 6s ease infinite;
}
.enterBtn,
.howtoBtn,
.backBtn,
.settingsBtn{
  padding:14px 30px;
  border:none;
  border-radius:14px;
  background:linear-gradient(145deg,var(--primary),var(--secondary));
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
.enterBtn,
.howtoBtn{
  margin:8px;
}
.settingsBtn{
  position:absolute;
  top:20px;
  right:20px;
  z-index:5;
}
.settingsPanel{
  position:absolute;
  top:70px;
  right:20px;
  width:240px;
  background:#151515;
  border:1px solid #2a2a2a;
  border-radius:12px;
  padding:12px;
  display:none;
  z-index:5;
}
.settingRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}
.toggle{
  width:40px;
  height:22px;
  background:#333;
  border-radius:20px;
  position:relative;
  cursor:pointer;
}
.toggle::after{
  content:"";
  position:absolute;
  width:16px;
  height:16px;
  top:3px;
  left:3px;
  border-radius:50%;
  background:white;
  transition:.2s;
}
.toggle.on{
  background:var(--primary);
}
.toggle.on::after{
  left:21px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  gap:10px;
}
.searchBar{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1a1a1a;
  color:white;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  overflow-y:auto;
  height:calc(100% - 80px);
}
.card{
  background:#1a1a1a;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
}
.card:hover{
  transform:scale(1.03);
}
.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}
.card h3{
  text-align:center;
  margin:0;
  padding:12px;
}
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
</style>
</head>
<body>
<div class="start" id="start">
  <iframe id="bgFrame" src="background.html"></iframe>
  <button class="settingsBtn" onclick="toggleSettings()">Settings</button>
  <div class="settingsPanel" id="settingsPanel">
    <div style="font-weight:bold; margin-bottom:10px;">Settings</div>
    <div class="settingRow">
      <span>Fancy Background</span>
      <div class="toggle on" id="bgToggle" onclick="toggleBG()"></div>
    </div>
  </div>
  <div class="content">
    <div class="logo">🎮 GAME HUB</div>
    <div>
      <button class="enterBtn" onclick="enterHub()">ENTER</button>
      <button class="howtoBtn" onclick="showHowTo()">HOW TO</button>
    </div>
  </div>
</div>

<div class="browser" id="browser">
  <div class="header">
    <h2>Browse Games</h2>
    <input
      type="text"
      class="searchBar"
      id="searchInput"
      placeholder="Search games..."
    >
    <button class="backBtn" onclick="goBack()">Back</button>
  </div>
  <div class="grid" id="gameGrid"></div>
</div>

<!-- Simple How To Overlay -->
<div class="howto" id="howto" style="display:none; position:absolute; inset:0; background:#0d0d0d; padding:30px; overflow-y:auto; z-index:10; flex-direction:column;">
  <button onclick="hideHowTo()" style="align-self:flex-start; padding:10px 20px; background:var(--secondary); border:none; border-radius:8px; color:white; margin-bottom:20px;">← Back</button>
  <h2>How to Use</h2>
  <p>This is a local HTML game hub. Make sure both files are in the same folder.</p>
</div>

<script>
let fancyEnabled = true;

const games = [
  {
    name:"Subway Surfers",
    img:"https://picsum.photos/400/200?1",
    url:"https://example.com"
  },
  {
    name:"Minecraft",
    img:"https://picsum.photos/400/200?2",
    url:"https://example.com"
  },
  {
    name:"Drift Hunters",
    img:"https://picsum.photos/400/200?3",
    url:"https://example.com"
  }
];

function toggleSettings(){
  const panel = document.getElementById("settingsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function toggleBG(){
  fancyEnabled = !fancyEnabled;
  const toggle = document.getElementById("bgToggle");
  const bg = document.getElementById("bgFrame");
  
  if(fancyEnabled){
    toggle.classList.add("on");
    bg.style.display = "block";
    if(bg.src.includes("about:blank")){
      bg.src = "background.html";
    }
  }else{
    toggle.classList.remove("on");
    bg.src = "about:blank";
    setTimeout(() => {
      bg.style.display = "none";
    }, 100);
  }
}

function enterHub(){
  document.getElementById("start").style.display = "none";
  document.getElementById("browser").style.display = "block";
}

function goBack(){
  document.getElementById("browser").style.display = "none";
  document.getElementById("start").style.display = "flex";
}

function showHowTo(){
  document.getElementById("howto").style.display = "flex";
}

function hideHowTo(){
  document.getElementById("howto").style.display = "none";
}

function populateGames(){
  const grid = document.getElementById("gameGrid");
  grid.innerHTML = "";
  games.forEach(game => {
    const card = document.createElement("div");
    card.className = "card";
    card.setAttribute("data-name",game.name.toLowerCase());
    card.innerHTML = `
      <img src="${game.img}">
      <h3>${game.name}</h3>
    `;
    card.onclick = () => {
      window.open(game.url,"_blank");
    };
    grid.appendChild(card);
  });
}

populateGames();

document.getElementById("searchInput").addEventListener("input",function(){
  const term = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card => {
    const name = card.getAttribute("data-name");
    card.style.display = name.includes(term) ? "block" : "none";
  });
});
</script>
</body>
</html>
