<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Background</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* MAIN BACKGROUND IMAGE */
.bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: url(https://i.ibb.co/87GbbFP/2799006.jpg) no-repeat center center;
    background-size: cover;
}

/* DARK OVERLAY */
.bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background: black;
    opacity: 0.3;
}

/* STAR FIELD WRAPPER */
.star-field {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    perspective: 800px;
    overflow: hidden;
}

/* STAR LAYERS */
.star-field .layer {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: white;

    box-shadow:
        -411px -476px #cccccc,
        777px -407px #d4d4d4,
        -387px -477px #fcfcfc,
        -91px -235px #d4d4d4,
        491px -460px #f7f7f7,
        892px -128px #f7f7f7,
        758px -277px #ededed,
        596px 378px #cccccc,
        647px 423px whitesmoke,
        183px 389px #c7c7c7,
        524px -237px #f0f0f0,
        679px -535px #e3e3e3,
        158px 399px #ededed,
        157px 249px #ededed,
        81px -450px #ebebeb,
        719px -360px #c2c2c2,
        -499px 473px #e8e8e8,
        -158px -349px #d4d4d4,
        870px -134px #cfcfcf,
        446px 404px #c2c2c2;

    transform-style: preserve-3d;
}

/* ANIMATIONS */
@keyframes sf-fly-by-1 {
    from { transform: translateZ(-600px); opacity: 0; }
    to   { transform: translateZ(0); opacity: 1; }
}

@keyframes sf-fly-by-2 {
    from { transform: translateZ(-1200px); opacity: 0; }
    to   { transform: translateZ(-600px); opacity: 1; }
}

@keyframes sf-fly-by-3 {
    from { transform: translateZ(-1800px); opacity: 0; }
    to   { transform: translateZ(-1200px); opacity: 1; }
}

/* LAYER SPEEDS */
.star-field .layer:nth-child(1) {
    animation: sf-fly-by-1 5s linear infinite;
}

.star-field .layer:nth-child(2) {
    animation: sf-fly-by-2 7s linear infinite;
}

.star-field .layer:nth-child(3) {
    animation: sf-fly-by-3 9s linear infinite;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="star-field">
    <div class="layer"></div>
    <div class="layer"></div>
    <div class="layer"></div>
</div>

</body>
</html>
